# CI: (1) Python 3.11 — same as scripts/ci-local.sh. (2) Bazel — gated with hashFiles on steps (not job if; unsupported there).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python 3.11 (pytest + test.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_lock.txt

      # Keep in sync with scripts/ci-local.sh (pytest -q + test.sh).
      - name: Unit + trace tests
        env:
          MPLBACKEND: Agg
          PYTHON: python
        run: bash scripts/ci-local.sh

  bazel:
    name: Bazel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # hashFiles() is not allowed on jobs.<id>.if; use step-level if instead.
      - uses: bazelbuild/setup-bazelisk@v3
        if: ${{ hashFiles('**/BUILD.bazel') != '' }}

      - name: Bazel test
        if: ${{ hashFiles('**/BUILD.bazel') != '' }}
        run: bazel test //...
